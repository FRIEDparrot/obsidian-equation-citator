sonar.projectName= Equation Citator
sonar.projectVersion=1.3.4

# Path is relative to the sonar-project.properties file.
sonar.sources=src

sonar.issue.ignore.multicriteria=e1, e2, e3, e4, e5

# ignore the "new Notice" unused object issue in TypeScript files
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S1848
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.ts, **/*.tsx

# exclude prefer `globalThis` over `window` in TypeScript files
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S7764
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.ts, **/*.tsx

# exclude void operators in TypeScript files (used for side effects in some cases)
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S3735
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.ts, **/*.tsx

# exclude "codePointAt" usage, use `charCodeAt` instead for it.
sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S7758
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.ts, **/*.tsx

# use `|` instead of `??` for hash functions
sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S7767
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*.ts, **/*.tsx

sonar.javascript.exclusions=**/*.js,**/*.jsx
